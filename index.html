<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kitirat-work — Projects</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 3rem 2rem 2rem;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .wordmark {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--muted);
    }

    .wordmark span { color: var(--text); }

    h1 {
      font-size: clamp(2rem, 5vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-top: 2.5rem;
    }

    .subtitle {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, rgba(99,102,241,0.08), transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.15);
    }

    .card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent-hover);
      background: rgba(99,102,241,0.12);
      border-radius: 4px;
      padding: 2px 7px;
      align-self: flex-start;
    }

    .card-arrow {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      color: var(--border);
      font-size: 1rem;
      transition: color 0.15s, transform 0.15s;
    }

    .card:hover .card-arrow {
      color: var(--accent-hover);
      transform: translate(2px, -2px);
    }

    footer {
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--accent-hover); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <div class="wordmark"><span>kitirat-work</span>.github.io</div>
    <h1>Mini Projects</h1>
    <p class="subtitle">A collection of small tools and experiments.<br>Pick one to get started.</p>
  </header>

  <main>
    <div class="section-label">Projects</div>
    <div class="grid">

      <a class="card" href="/besmart/timesheet/">
        <span class="card-icon">🕐</span>
        <div class="card-title">Timesheet</div>
        <div class="card-desc">Track daily work hours, log tasks, and export timesheets — works offline as a PWA.</div>
        <span class="card-tag">besmart</span>
        <span class="card-arrow">↗</span>
      </a>

      <!-- Add more project cards below this line -->

    </div>
  </main>

  <footer>
    Built by <a href="https://github.com/kitirat-work" target="_blank" rel="noopener">kitirat-work</a>
  </footer>

</body>
</html>
